name: alle_explorer
description: A full-featured, modular file manager for Android.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  permission_handler: ^11.0.0
  video_player: ^2.8.0
  syncfusion_flutter_pdfviewer: ^24.1.41
  flutter_image_compress: ^2.1.0
  collection: ^1.18.0
  path_provider: ^2.1.0
  file_picker: ^8.0.0
  photo_view: ^0.14.0
  mime: ^1.0.4
  logger: ^2.0.0
  archive: ^3.4.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
