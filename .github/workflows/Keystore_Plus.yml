name: 3. Generate Keystore

on:
  workflow_dispatch:
    inputs:
      keystore_name:
        description: "Keystore file name (example: release-keystore.jks)"
        required: true
        default: "release-keystore.jks"

      store_password:
        description: "Keystore store password"
        required: true

      key_password:
        description: "Key password"
        required: true

      key_alias:
        description: "Key alias"
        required: true
        default: "release"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
          -keystore ${{ github.event.inputs.keystore_name }} \
          -storepass ${{ github.event.inputs.store_password }} \
          -keypass ${{ github.event.inputs.key_password }} \
          -alias ${{ github.event.inputs.key_alias }} \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android App,O=Unknown,L=Unknown,S=Unknown,C=IN"

      - name: Convert keystore to Base64
        run: |
          base64 ${{ github.event.inputs.keystore_name }} > keystore_base64.txt

      - name: Extract SHA fingerprints
        run: |
          keytool -list -v \
          -keystore ${{ github.event.inputs.keystore_name }} \
          -storepass ${{ github.event.inputs.store_password }} \
          -alias ${{ github.event.inputs.key_alias }} > keystore_info.txt

          SHA1=$(grep "SHA1:" keystore_info.txt | head -n1 | sed 's/.*SHA1: //')
          SHA256=$(grep "SHA256:" keystore_info.txt | head -n1 | sed 's/.*SHA256: //')

          echo "SHA1=$SHA1" >> $GITHUB_ENV
          echo "SHA256=$SHA256" >> $GITHUB_ENV

      - name: Write Summary
        run: |
          echo "## 🔐 Keystore Generated Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### SHA-1 Fingerprint" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$SHA1" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          echo "### SHA-256 Fingerprint" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$SHA256" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          echo "### Base64 Keystore (Copy this)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat keystore_base64.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          echo "### Add these secrets to your GitHub repository" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Go to: **Repository → Settings → Secrets → Actions → New repository secret**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Secret Name | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| KEYSTORE_BASE64 | (paste the Base64 text above) |" >> $GITHUB_STEP_SUMMARY
          echo "| STORE_PASSWORD | ${{ github.event.inputs.store_password }} |" >> $GITHUB_STEP_SUMMARY
          echo "| KEY_PASSWORD | ${{ github.event.inputs.key_password }} |" >> $GITHUB_STEP_SUMMARY
          echo "| KEY_ALIAS | ${{ github.event.inputs.key_alias }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-keystore
          path: |
            ${{ github.event.inputs.keystore_name }}
            keystore_base64.txt
            keystore_info.txt
