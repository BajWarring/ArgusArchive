name: Build APK

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  # 📥 Checkout
  - name: Checkout Repo
    uses: actions/checkout@v4

  # ☕ Set EXACT Java (no ambiguity)
  - name: Setup Java 17
    uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '17'

  # 🔍 Verify Java (debug safety)
  - name: Verify Java
    run: java -version

  # 🧹 Clean ALL caches (critical for your error)
  - name: Clean Gradle & Flutter cache
    run: |
      rm -rf ~/.gradle/caches
      rm -rf ~/.gradle/wrapper
      flutter clean || true

  # 📦 Setup Flutter
  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.27.4'
      cache: true

  # 🔐 Decode keystore
  - name: Decode Keystore
    run: |
      echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

  # 🔐 Create key.properties
  - name: Create key.properties
    run: |
      echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
      echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
      echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
      echo "storeFile=upload-keystore.jks" >> android/key.properties

  # 📦 Install dependencies
  - name: Get Dependencies
    run: flutter pub get

  # ⚠️ Disable Jetifier (fixes your crash)
  - name: Disable Jetifier
    run: echo "android.enableJetifier=false" >> android/gradle.properties

  # 🔨 Build APK
  - name: Build APK
    run: flutter build apk --release --build-number=${{ github.run_number }}

  # 📤 Upload APK
  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: app-release
      path: build/app/outputs/flutter-apk/app-release.apk
